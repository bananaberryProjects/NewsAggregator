<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .article-card { transition: transform 0.2s; }
        .article-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .feed-badge { font-size: 0.75rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href=".">📰 News Aggregator</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="index">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="feeds">Feeds</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="articles">Artikel</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">Feeds</h5>
                        <p class="card-text display-4" th:text="${feedCount}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">Artikel</h5>
                        <p class="card-text display-4" th:text="${articleCount}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Schnellsuche</h5>
                        <form action="articles" method="get">
                            <div class="input-group">
                                <input type="text" class="form-control" name="query" placeholder="Artikel durchsuchen...">
                                <button class="btn btn-primary" type="submit">Suchen</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <h3>Neueste Artikel</h3>
        <div class="row" th:if="${#lists.isEmpty(recentArticles)}">
            <div class="col">
                <div class="alert alert-info">
                    Noch keine Artikel vorhanden. <a href="feeds">Füge einen Feed hinzu</a>, um zu beginnen.
                </div>
            </div>
        </div>

        <div class="row" th:unless="${#lists.isEmpty(recentArticles)}">
            <div class="col-md-6 mb-3" th:each="article : ${recentArticles}">
                <div class="card article-card">
                    <div class="card-body">
                        <span class="badge bg-secondary feed-badge mb-2" th:text="${article.feedName}">Feed</span>
                        <h5 class="card-title" th:text="${article.title}">Titel</h5>
                        <p class="card-text text-muted small" th:text="${#temporals.format(article.publishedAt, 'dd.MM.yyyy HH:mm')}">Datum</p>
                        <p class="card-text" th:text="${#strings.abbreviate(article.description, 150)}">Beschreibung</p>
                        <a th:href="${article.link}" target="_blank" class="btn btn-sm btn-outline-primary">Lesen →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

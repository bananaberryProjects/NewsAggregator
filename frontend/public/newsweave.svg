<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg_grad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1A237E"/> <!-- Deep Navy -->
            <stop offset="100%" stop-color="#4DB6AC"/> <!-- Modern Petrol -->
        </linearGradient>
    </defs>

    <!-- App Icon Background -->
    <rect width="1024" height="1024" rx="220" fill="url(#bg_grad)"/>

    <!-- Stylized Paper/Article Stack -->
    <g transform="translate(262, 212)">
        <!-- Paper Base -->
        <rect width="500" height="600" rx="30" fill="white"/>
        
        <!-- Finance & Business Lines -->
        <rect x="60" y="80" width="380" height="40" rx="8" fill="#E0E0E0"/>
        <rect x="60" y="150" width="250" height="40" rx="8" fill="#E0E0E0"/>

        <!-- Lifestyle/Visual Accent (Coral) -->
        <rect x="60" y="240" width="380" height="200" rx="20" fill="#FF7043"/> 
        
        <!-- Content Lines Bottom -->
        <rect x="60" y="480" width="380" height="20" rx="4" fill="#F0F0F0"/>
        <rect x="60" y="520" width="180" height="20" rx="4" fill="#F0F0F0"/>
    </g>
</svg>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - News Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .article-card { 
            transition: transform 0.2s; 
            overflow: hidden;
        }
        .article-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        .article-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background-color: #f0f0f0;
        }
        .article-image-placeholder {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href=".">📰 News Aggregator</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href=".">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="feeds">Feeds</a></li>
                    <li class="nav-item"><a class="nav-link active" href="articles">Artikel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Artikel</h2>

        <form class="mb-4" method="get" action="articles">
            <div class="input-group">
                <input type="text" class="form-control" name="query" 
                       th:value="${query}" placeholder="Artikel durchsuchen...">
                <button class="btn btn-primary" type="submit">Suchen</button>
                <a href="articles" class="btn btn-outline-secondary">Zurücksetzen</a>
            </div>
        </form>

        <div class="alert alert-info" th:if="${#lists.isEmpty(articles)}">
            Keine Artikel gefunden. <a href="feeds">Füge einen Feed hinzu</a>, um Artikel zu sammeln.
        </div>

        <div class="row" th:unless="${#lists.isEmpty(articles)}">
            <div class="col-md-6 mb-3" th:each="article : ${articles}">
                <div class="card article-card h-100">
                    <!-- Bild oder Platzhalter -->
                    <div th:if="${article.imageUrl != null}">
                        <img th:src="${article.imageUrl}" 
                             class="article-image" 
                             th:alt="${article.title}"
                             onerror="this.parentElement.innerHTML='<div class=\'article-image-placeholder\'>📰</div>'">
                    </div>
                    <div th:unless="${article.imageUrl != null}" class="article-image-placeholder">
                        📰
                    </div>
                    
                    <div class="card-body">
                        <span class="badge bg-secondary mb-2" th:text="${article.feedName}">Feed</span>
                        <h5 class="card-title" th:text="${article.title}">Titel</h5>
                        <p class="card-text text-muted small">
                            <span th:text="${#temporals.format(article.publishedAt, 'dd.MM.yyyy HH:mm')}">Datum</span>
                        </p>
                        <p class="card-text" th:text="${#strings.abbreviate(article.description, 150)}">Beschreibung</p>
                        <a th:href="${article.link}" target="_blank" class="btn btn-primary">
                            Zum Artikel →
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

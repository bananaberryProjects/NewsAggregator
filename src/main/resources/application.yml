spring:
  application:
    name: news-aggregator
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  
  thymeleaf:
    cache: false

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  level:
    com:
      newsaggregator: DEBUG

# Auto-Cleanup Configuration
cleanup:
  articles:
    enabled: true
    days: 30  # Articles older than N days will be deleted
    cron: "0 0 2 * * ?"  # Run daily at 2:00 AM

---
# Dev-Profil: H2 In-Memory
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:h2:mem:newsdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
      path: /h2-console

---
# Docker-Profil: PostgreSQL mit Environment Variables
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:db}:${POSTGRES_PORT:5432}/${POSTGRES_DB:newsdb}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  web:
    resources:
      static-locations: classpath:/static/,file:/app/static/

  mvc:
    static-path-pattern: /**

---
# Prod-Profil: PostgreSQL
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:host.docker.internal}:${POSTGRES_PORT:5432}/${POSTGRES_DB:newsdb}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
